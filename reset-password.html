<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Reset Password | CampusPe</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
	<link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
	<main class="container d-flex align-items-center justify-content-center min-vh-100 py-4">
		<div class="card auth-card auth-card-sm w-100">
			<div class="card-body p-4">
				<h1 class="h4 text-center mb-4">Reset Password</h1>

				<form>
					<div class="mb-3">
						<label for="newPassword" class="form-label">New Password</label>
						<div class="input-group">
							<input id="newPassword" type="password" class="form-control" required>
							<button class="btn btn-outline-secondary password-toggle" type="button" data-target="newPassword" aria-label="Toggle password visibility">
								<i class="bi bi-eye"></i>
							</button>
						</div>
					</div>

					<div class="mb-4">
						<label for="confirmPassword" class="form-label">Confirm Password</label>
						<div class="input-group">
							<input id="confirmPassword" type="password" class="form-control" required>
							<button class="btn btn-outline-secondary password-toggle" type="button" data-target="confirmPassword" aria-label="Toggle password visibility">
								<i class="bi bi-eye"></i>
							</button>
						</div>
					</div>

					<div class="d-grid mb-3">
						<a href="index.html" class="btn btn-primary">Update Password</a>
					</div>

					<p class="auth-links text-center mb-0">
						<a href="index.html">Back to Login</a>
					</p>
				</form>
			</div>
		</div>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script>
		document.querySelectorAll('.password-toggle').forEach(function (button) {
			button.addEventListener('click', function () {
				var targetId = this.getAttribute('data-target');
				var input = document.getElementById(targetId);
				var icon = this.querySelector('i');

				if (input.type === 'password') {
					input.type = 'text';
					icon.classList.remove('bi-eye');
					icon.classList.add('bi-eye-slash');
				} else {
					input.type = 'password';
					icon.classList.remove('bi-eye-slash');
					icon.classList.add('bi-eye');
				}
			});
		});
	</script>
</body>
</html>
