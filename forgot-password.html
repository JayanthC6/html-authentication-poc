<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Forgot Password | CampusPe</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
	<link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
	<main class="container d-flex align-items-center justify-content-center min-vh-100 py-4">
		<div class="card auth-card auth-card-sm w-100">
			<div class="card-body p-4">
				<h1 class="h4 text-center mb-4">Forgot Password</h1>

				<form>
					<div class="mb-4">
						<label for="resetEmail" class="form-label">Email</label>
						<input id="resetEmail" type="email" class="form-control" placeholder="Enter email" required>
					</div>

					<div class="d-grid mb-3">
						<a href="reset-password.html" class="btn btn-primary">Send Reset Link</a>
					</div>

					<p class="auth-links text-center mb-0">
						<a href="index.html">Back to Login</a>
					</p>
				</form>
			</div>
		</div>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
