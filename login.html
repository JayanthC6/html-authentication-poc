<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login | CampusPe</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
	<link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
	<main class="container d-flex align-items-center justify-content-center min-vh-100 py-4">
		<div class="card auth-card auth-card-sm w-100">
			<div class="card-body p-4">
				<h1 class="h4 text-center mb-4">Login</h1>

				<form>
					<div class="mb-3">
						<label for="username" class="form-label">Username</label>
						<input id="username" type="text" class="form-control" placeholder="Enter username" required>
					</div>

					<div class="mb-3">
						<label for="password" class="form-label">Password</label>
						<input id="password" type="password" class="form-control" placeholder="Enter password" required>
					</div>

					<div class="d-grid mb-3">
						<a href="dashboard.html" class="btn btn-primary">Login</a>
					</div>

					<div class="auth-links text-center">
						<a href="forgot-password.html" class="d-block mb-2">Forgot Password?</a>
						<a href="register.html" class="d-block">Create Account</a>
					</div>
				</form>
			</div>
		</div>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
