<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Register | CampusPe</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
	<link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
	<main class="container d-flex align-items-center justify-content-center min-vh-100 py-4">
		<div class="card auth-card auth-card-md w-100">
			<div class="card-body p-4">
				<h1 class="h4 text-center mb-4">Register</h1>

				<form class="needs-validation" novalidate>
					<div class="mb-3">
						<label for="fullName" class="form-label">Name</label>
						<input id="fullName" type="text" class="form-control" required>
					</div>
					<div class="mb-3">
						<label for="email" class="form-label">Email</label>
						<input id="email" type="email" class="form-control" required>
					</div>
					<div class="mb-3">
						<label for="phone" class="form-label">Phone</label>
						<input id="phone" type="tel" class="form-control" required>
					</div>
					<div class="mb-3">
						<label for="password" class="form-label">Password</label>
						<input id="password" type="password" class="form-control" required>
					</div>
					<div class="mb-3">
						<label for="confirmPassword" class="form-label">Confirm Password</label>
						<input id="confirmPassword" type="password" class="form-control" required>
					</div>

					<div class="d-grid mt-4">
						<a href="dashboard.html" class="btn btn-primary">Register</a>
					</div>

					<p class="text-center mt-3 mb-0 auth-links">
						<a href="index.html">Already have an account?</a>
					</p>
				</form>
			</div>
		</div>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
