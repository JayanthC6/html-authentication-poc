<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Intern Assignment</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-wrapper">
    <div class="card auth-card auth-register w-100">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <h1 class="h3 brand-title mb-1">Create Account</h1>
          <p class="text-muted mb-0">Fill in your details to register</p>
        </div>

        <form class="row g-3 needs-validation" novalidate>
          <div class="col-md-6">
            <label for="firstName" class="form-label">First Name</label>
            <input type="text" class="form-control" id="firstName" placeholder="John" required>
            <div class="invalid-feedback">Please enter your first name.</div>
          </div>

          <div class="col-md-6">
            <label for="lastName" class="form-label">Last Name</label>
            <input type="text" class="form-control" id="lastName" placeholder="Doe" required>
            <div class="invalid-feedback">Please enter your last name.</div>
          </div>

          <div class="col-12">
            <label for="registerEmail" class="form-label">Email</label>
            <input type="email" class="form-control" id="registerEmail" placeholder="name@example.com" required>
            <div class="invalid-feedback">Please enter a valid email.</div>
          </div>

          <div class="col-md-6">
            <label for="registerPassword" class="form-label">Password</label>
            <input type="password" class="form-control" id="registerPassword" placeholder="Create password" required>
            <div class="invalid-feedback">Please enter a password.</div>
          </div>

          <div class="col-md-6">
            <label for="confirmPassword" class="form-label">Confirm Password</label>
            <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm password" required>
            <div class="invalid-feedback">Please confirm your password.</div>
          </div>

          <div class="col-12">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" value="" id="termsCheck" required>
              <label class="form-check-label" for="termsCheck">
                I agree to the terms and conditions
              </label>
              <div class="invalid-feedback">You must agree before submitting.</div>
            </div>
          </div>

          <div class="col-12">
            <button class="btn btn-success w-100 py-2" type="submit">
              <i class="bi bi-person-plus-fill me-1"></i>
              Register
            </button>
          </div>
        </form>

        <div class="link-row d-flex justify-content-between flex-wrap gap-2 mt-4">
          <a href="index.html">Back to login</a>
          <a href="forgot-password.html">Forgot password?</a>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script>
    (() => {
      'use strict';
      const forms = document.querySelectorAll('.needs-validation');
      Array.from(forms).forEach((form) => {
        form.addEventListener('submit', (event) => {
          if (!form.checkValidity()) {
            event.preventDefault();
            event.stopPropagation();
          }
          form.classList.add('was-validated');
        }, false);
      });
    })();
  </script>
</body>
</html>
